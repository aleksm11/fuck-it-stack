<h1 style="font-size: var(--text-3xl); margin-bottom: var(--space-6);">Shopping Cart</h1>
<div id="cart-container"></div>

<script type="module">
  import { cart, cartTotal, products } from '/state/store.js';
  import { observe } from '/lib/signal.js';

  const container = document.getElementById('cart-container');

  observe(() => {
    const items = cart.get();
    const total = cartTotal.get();
    const prods = products.peek();

    if (items.size === 0) {
      container.innerHTML = `
        <div style="text-align: center; padding: var(--space-16) 0;">
          <p style="font-size: 4rem; margin-bottom: var(--space-4);">🛒</p>
          <h2 style="color: var(--color-muted); margin-bottom: var(--space-6);">Your cart is empty</h2>
          <a href="/products" style="display: inline-block; background: var(--color-primary); color: white; padding: var(--space-3) var(--space-8); border-radius: var(--radius); text-decoration: none; font-weight: 500;">Browse Products</a>
        </div>
      `;
      return;
    }

    let itemsHtml = '';
    for (const [id, qty] of items) {
      const prod = prods.find(p => p.id === id);
      if (!prod) continue;
      itemsHtml += `<cart-item product-id="${prod.id}" name="${prod.name}" price="${prod.price}" image="${prod.image}" qty="${qty}"></cart-item>`;
    }

    container.innerHTML = `
      <div style="display: flex; flex-direction: column; gap: var(--space-4);">
        ${itemsHtml}
      </div>
      <div style="margin-top: var(--space-8); padding: var(--space-6); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: var(--text-xl); font-weight: 600;">Total</span>
        <span style="font-size: var(--text-2xl); font-weight: 700; color: var(--color-primary);">$${total.toFixed(2)}</span>
      </div>
    `;
  });
</script>
